services:
  - type: web
    name: smart-sorter-v5
    env: python
    plan: starter

    # Pin Python to a wheel-supported version
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash

    buildCommand: pip install -r requirements.txt
    startCommand: python smart_sorter_web.py

    autoDeploy: true

