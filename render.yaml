services:
  - type: web
    name: smart-sorter-v5
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python smart_sorter_web.py
    autoDeploy: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
